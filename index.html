<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>訓練紀錄本</title>
<meta name="theme-color" content="#EFFBFA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="訓練紀錄本" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #EFFBFA;
    color: #233330;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    padding-bottom: 92px;
    -webkit-tap-highlight-color: transparent;
  }
  .page { max-width: 640px; margin: 0 auto; }
  .font-display { font-family: 'Space Grotesk', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* ---- header ---- */
  .header {
    background: #EFFBFA;
    border-bottom: 1px solid #DCEEEC;
    padding: 22px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 20;
    text-align: left;
  }
  .header-row { display: flex; align-items: center; gap: 8px; }
  .header-row .icon { color: #159C93; }
  .header h1 { font-size: 25px; font-weight: 800; margin: 0; letter-spacing: -0.02em; text-align: left; }
  .header p { color: #6E8C89; font-size: 14px; margin: 4px 0 0; text-align: left; }

  /* ---- toast ---- */
  .toast {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 50; background: #159C93; color: #E3F8F6; font-size: 14px;
    padding: 9px 18px; border-radius: 999px; box-shadow: 0 4px 14px rgba(43,34,48,0.18);
    display: none;
  }
  .toast.show { display: block; }

  /* ---- layout ---- */
  .content { padding: 16px; text-align: left; }
  .card {
    background: #fff; border: 1px solid #DCEEEC; border-radius: 16px;
    padding: 16px; box-shadow: 0 1px 3px rgba(43,34,48,0.05); text-align: left;
  }
  .card + .card, .block + .block { margin-top: 16px; }
  .card-title {
    font-size: 13px; font-weight: 600; color: #6E8C89; text-transform: uppercase;
    letter-spacing: 0.04em; margin: 0 0 12px;
  }

  .field { margin-bottom: 14px; text-align: left; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 14px; color: #6E8C89; margin-bottom: 7px; display: flex;
    align-items: center; gap: 5px; text-align: left;
  }
  .field-hint { color: #9BB5B2; font-weight: 400; }

  input[type=text], input[type=date], input[type=number], textarea {
    width: 100%; border: 1px solid #D3EBE8; border-radius: 10px; padding: 11px 14px;
    font-size: 16px; color: #233330; background: #fff; font-family: inherit;
    text-align: left;
  }
  textarea { resize: vertical; }
  input:focus, textarea:focus {
    outline: none; border-color: #159C93; box-shadow: 0 0 0 3px rgba(21,156,147,0.15);
  }
  input::placeholder, textarea::placeholder { color: #9BB5B2; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid #D3EBE8; background: #fff; color: #56706D; padding: 9px 16px;
    border-radius: 999px; font-size: 16px; cursor: pointer; font-family: inherit;
  }
  .chip.selected { background: #159C93; color: #fff; border-color: #159C93; }
  .chip-sm {
    border: none; background: #D9F2EF; color: #0E7A72; padding: 6px 13px;
    border-radius: 999px; font-size: 14px; cursor: pointer; font-family: inherit;
  }

  .btn-primary {
    width: 100%; background: #159C93; color: #fff; border: none; border-radius: 10px;
    padding: 13px; font-size: 16px; font-weight: 600; display: flex; align-items: center;
    justify-content: center; gap: 7px; cursor: pointer; font-family: inherit;
  }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-secondary {
    border: 1px solid #D3EBE8; background: #fff; color: #233330; border-radius: 10px;
    padding: 11px 16px; font-size: 16px; cursor: pointer; display: flex; align-items: center;
    gap: 6px; font-family: inherit; white-space: nowrap;
  }
  .btn-text { background: none; border: none; color: #6E8C89; font-size: 16px; cursor: pointer; padding: 8px 4px; font-family: inherit; display:flex; align-items:center; gap:4px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn-primary { flex: 1; }

  /* ---- exercise cards ---- */
  .exercise-card { border: 1px solid #DCEEEC; background: #fff; border-radius: 12px; padding: 14px; text-align: left; }
  .exercise-card + .exercise-card { margin-top: 8px; }
  .exercise-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .exercise-name { font-weight: 700; font-size: 18px; color: #233330; }
  .exercise-meta { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: #6E8C89; margin-top: 4px; }
  .exercise-note { font-size: 14px; color: #6E8C89; margin-top: 6px; line-height: 1.6; }
  .exercise-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; color: #9BB5B2; padding: 7px; cursor: pointer; display:flex; }

  .edit-card { border: 2px solid #159C93; background: #E7F7F5; border-radius: 12px; padding: 14px; text-align: left; }
  .edit-card .field { margin-bottom: 10px; }

  /* ---- history ---- */
  .history-item {
    width: 100%; text-align: left; background: #fff; border: 1px solid #DCEEEC;
    border-left: 4px solid #159C93; border-radius: 12px; padding: 14px 16px 14px 14px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 3px rgba(43,34,48,0.05); cursor: pointer; font-family: inherit;
  }
  .history-item + .history-item { margin-top: 8px; }
  .history-name { font-weight: 700; font-size: 18px; color: #233330; }
  .history-sub { font-size: 14px; color: #6E8C89; margin-top: 2px; }
  .history-time { font-family: 'IBM Plex Mono', monospace; font-size: 16px; color: #6E8C89; flex-shrink: 0; padding-left: 10px; }

  .session-header { background: #fff; border: 1px solid #DCEEEC; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(43,34,48,0.05); text-align: left; }
  .session-header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .session-name { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 21px; color: #233330; }
  .session-date { font-size: 14px; color: #6E8C89; margin-top: 4px; }
  .session-note { font-size: 14px; color: #56706D; margin-top: 10px; padding-top: 10px; border-top: 1px solid #DCEEEC; line-height: 1.6; }

  .tag-purpose { font-size: 12px; padding: 5px 11px; border-radius: 999px; background: #D9F2EF; color: #0E7A72; font-weight: 600; flex-shrink: 0; }

  .back-link { display: flex; align-items: center; gap: 4px; font-size: 16px; color: #6E8C89; background: none; border: none; padding: 8px 0 12px; cursor: pointer; font-family: inherit; }

  /* ---- nav ---- */
  .nav-bar { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-top: 1px solid #DCEEEC; z-index: 30; }
  .nav-inner { max-width: 640px; margin: 0 auto; display: flex; justify-content: space-around; padding: 6px 0; }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 18px;
    border-radius: 10px; background: none; border: none; color: #9BB5B2; font-size: 12px;
    font-family: inherit; cursor: pointer; flex: 1;
  }
  .nav-btn.active { color: #159C93; }

  .alert-error {
    margin: 0 16px 16px; display: flex; gap: 8px; background: #FDF0EF; border: 1px solid #F3C9C4;
    color: #B23A2E; font-size: 14px; border-radius: 12px; padding: 12px; text-align: left;
  }

  .empty-state { color: #9BB5B2; font-size: 16px; text-align: center; padding: 32px 0; }

  .setup-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; margin: 0 0 6px; text-align: left; }
  .setup-desc { font-size: 14px; color: #6E8C89; margin: 0 0 16px; line-height: 1.6; text-align: left; }

  .chips-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .name-tag {
    display: flex; align-items: center; gap: 6px; background: #D9F2EF; color: #0E7A72;
    font-size: 16px; padding: 7px 14px; border-radius: 999px;
  }
  .name-tag button { background: none; border: none; color: #4FA39C; cursor: pointer; display: flex; padding: 0; }

  .icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="page">
    <div class="header-row">
      <span id="header-icon"></span>
      <h1>訓練紀錄本</h1>
    </div>
    <p>即時記錄每位學生的每一組訓練</p>
  </div>
</div>

<div id="toast" class="toast mono"></div>

<div id="app" class="page"></div>

<div class="nav-bar">
  <div class="nav-inner">
    <button onclick="setTab('log')" id="nav-log" class="nav-btn"></button>
    <button onclick="setTab('history')" id="nav-history" class="nav-btn"></button>
    <button onclick="setTab('settings')" id="nav-settings" class="nav-btn"></button>
  </div>
</div>

<script>
// ---------------- icons (inline SVG, no external dependency) ----------------
const ICON_PATHS = {
  plus: '<path d="M12 5v14M5 12h14"/>',
  x: '<path d="M18 6 6 18M6 6l12 12"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  chevronLeft: '<path d="M15 18l-6-6 6-6"/>',
  calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  users: '<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>',
  settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  clipboard: '<path d="M9 2h6a1 1 0 0 1 1 1v1H8V3a1 1 0 0 1 1-1z"/><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M9 11h6M9 15h6M9 19h3"/>',
  pencil: '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
  trash: '<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/>',
  loader: '<circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M22 12a10 10 0 0 1-10 10"/>',
  alert: '<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>',
  dumbbell: '<rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/><path d="M6 12h12"/><rect x="8.5" y="10" width="2" height="4" rx="0.5"/><rect x="13.5" y="10" width="2" height="4" rx="0.5"/>',
  trend: '<path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/>',
};
function ic(name, size, spinning) {
  size = size || 18;
  const cls = 'icon' + (spinning ? ' spin' : '');
  return `<svg class="${cls}" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[name] || ''}</svg>`;
}

const PURPOSE_CHIPS = ["增肌", "減脂", "心肺", "體能", "專項技術", "復健", "比賽期"];

// 舊版 roster 是純姓名字串陣列,這裡做相容轉換成物件 { name, gender, birthday }
function loadRoster() {
  let raw = [];
  try { raw = JSON.parse(localStorage.getItem('roster') || '[]'); } catch (e) {}
  return raw.map(item => typeof item === 'string' ? { name: item, gender: '', birthday: '' } : item);
}
function saveRoster() {
  localStorage.setItem('roster', JSON.stringify(state.roster));
}

const state = {
  sheetUrl: localStorage.getItem('apps_script_url') || '',
  roster: loadRoster(),
  tab: 'log',
  rows: [],
  loadingRows: false,
  fetchError: '',
  savingId: null,
  session: { student: '', date: todayStr(), purpose: '', sessionNote: '' },
  exerciseForm: { name: '', sets: '', reps: '', weight: '', duration: '', notes: '' },
  editingId: null,
  editDraft: {},
  selectedSessionKey: null,
  historySearch: '',
  historyMonth: '',
  urlDraft: localStorage.getItem('apps_script_url') || '',
  newStudent: { name: '', gender: '', birthday: '' },
  editingStudent: null,
  studentEditDraft: {},
  expandedMaxWeights: null,
};

function todayStr() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  const wd = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()} (${wd})`;
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function setTab(tab) {
  state.tab = tab;
  state.selectedSessionKey = null;
  render();
}

async function fetchRows() {
  if (!state.sheetUrl) return;
  state.loadingRows = true;
  state.fetchError = '';
  render();
  try {
    const res = await fetch(state.sheetUrl, { method: 'GET' });
    const data = await res.json();
    if (data.status === 'ok') {
      state.rows = data.data || [];
    } else {
      state.fetchError = data.message || '讀取失敗';
    }
  } catch (e) {
    state.fetchError = '無法連上 Google Sheets,請確認設定裡的網址跟部署權限(誰可以存取需選「所有人」)';
  } finally {
    state.loadingRows = false;
    render();
  }
}

function saveUrl() {
  state.sheetUrl = state.urlDraft.trim();
  localStorage.setItem('apps_script_url', state.sheetUrl);
  showToast('已儲存設定');
  render();
  fetchRows();
}

function addStudent() {
  const name = state.newStudent.name.trim();
  if (!name || state.roster.some(s => s.name === name)) return;
  state.roster.push({ name, gender: state.newStudent.gender, birthday: state.newStudent.birthday });
  state.newStudent = { name: '', gender: '', birthday: '' };
  saveRoster();
  render();
}
function removeStudent(name) {
  state.roster = state.roster.filter(s => s.name !== name);
  saveRoster();
  render();
}
function startEditStudent(s) {
  state.editingStudent = s.name;
  state.studentEditDraft = { name: s.name, gender: s.gender || '', birthday: s.birthday || '' };
  render();
}
function cancelEditStudent() { state.editingStudent = null; render(); }
function saveEditStudent(originalName) {
  const newName = state.studentEditDraft.name.trim();
  if (!newName) { showToast('姓名不能空白'); return; }
  state.roster = state.roster.map(s => s.name === originalName ? { name: newName, gender: state.studentEditDraft.gender, birthday: state.studentEditDraft.birthday } : s);
  // 如果改了姓名,同步更新目前選取中的學生跟歷史搜尋文字,避免對不上
  if (state.session.student === originalName) state.session.student = newName;
  if (state.historySearch === originalName) state.historySearch = newName;
  state.editingStudent = null;
  saveRoster();
  render();
}
function toggleMaxWeights(name) {
  state.expandedMaxWeights = state.expandedMaxWeights === name ? null : name;
  render();
}

function calcAge(birthday) {
  if (!birthday) return null;
  const b = new Date(birthday + 'T00:00:00');
  if (isNaN(b)) return null;
  const now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  const m = now.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
  return age;
}

// 該學生每個動作曾經記錄過的最大重量
function getStudentMaxWeights(name) {
  const map = new Map();
  for (const r of state.rows) {
    if (r['學生姓名'] !== name) continue;
    const w = parseFloat(r['重量']);
    if (!w) continue;
    const ex = r['動作名稱'];
    if (!map.has(ex) || w > map.get(ex)) map.set(ex, w);
  }
  return Array.from(map.entries()).map(([exercise, maxWeight]) => ({ exercise, maxWeight })).sort((a,b) => b.maxWeight - a.maxWeight);
}

function selectStudent(name) { state.session.student = name; render(); }
function selectPurpose(p) { state.session.purpose = p; render(); }
function onDateChange(v) { state.session.date = v; render(); }

function getSessions() {
  const map = new Map();
  for (const r of state.rows) {
    const key = `${r['學生姓名']}||${r['日期']}`;
    if (!map.has(key)) {
      map.set(key, { key, student: r['學生姓名'], date: r['日期'], purpose: r['訓練目的'], sessionNote: r['本堂備註'], exercises: [], latest: r['建立時間'] });
    }
    const s = map.get(key);
    s.exercises.push(r);
    if (new Date(r['建立時間']) > new Date(s.latest)) s.latest = r['建立時間'];
    if (r['訓練目的']) s.purpose = r['訓練目的'];
    if (r['本堂備註']) s.sessionNote = r['本堂備註'];
  }
  return Array.from(map.values()).sort((a,b) => new Date(b.latest) - new Date(a.latest));
}

function getCurrentSessionExercises() {
  if (!state.session.student || !state.session.date) return [];
  return state.rows
    .filter(r => r['學生姓名'] === state.session.student && r['日期'] === state.session.date)
    .sort((a,b) => new Date(a['建立時間']) - new Date(b['建立時間']));
}

// 訓練容量 = 組數 × 次數 × 重量,依日期加總,只計算有填重量的動作
function getStudentVolumeSeries(student) {
  const map = new Map();
  for (const r of state.rows) {
    if (r['學生姓名'] !== student) continue;
    const sets = parseFloat(r['組數']) || 0;
    const reps = parseFloat(r['次數']) || 0;
    const weight = parseFloat(r['重量']) || 0;
    const vol = sets * reps * weight;
    if (!vol) continue;
    map.set(r['日期'], (map.get(r['日期']) || 0) + vol);
  }
  return Array.from(map.entries())
    .map(([date, volume]) => ({ date, volume }))
    .sort((a, b) => new Date(a.date) - new Date(b.date));
}

// 單堂(一組動作清單)的訓練容量總和
function getSessionVolume(exercises) {
  return exercises.reduce((sum, r) => {
    const sets = parseFloat(r['組數']) || 0;
    const reps = parseFloat(r['次數']) || 0;
    const weight = parseFloat(r['重量']) || 0;
    return sum + sets * reps * weight;
  }, 0);
}

function syncSessionMetaFromRows() {
  const existing = getCurrentSessionExercises();
  if (existing.length > 0) {
    const last = existing[existing.length - 1];
    if (!state.session.purpose && last['訓練目的']) state.session.purpose = last['訓練目的'];
    if (!state.session.sessionNote && last['本堂備註']) state.session.sessionNote = last['本堂備註'];
  }
}

async function submitExercise() {
  if (!state.session.student || !state.session.date || !state.exerciseForm.name.trim()) {
    showToast('請填寫學生、日期跟動作名稱');
    return;
  }
  state.savingId = 'new';
  render();
  const payload = {
    action: 'add',
    studentName: state.session.student,
    date: state.session.date,
    purpose: state.session.purpose,
    sessionNote: state.session.sessionNote,
    exercise: state.exerciseForm.name.trim(),
    sets: state.exerciseForm.sets,
    reps: state.exerciseForm.reps,
    weight: state.exerciseForm.weight,
    duration: state.exerciseForm.duration,
    notes: state.exerciseForm.notes,
  };
  try {
    const res = await fetch(state.sheetUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      state.rows.push({
        ID: data.id, 學生姓名: state.session.student, 日期: state.session.date,
        訓練目的: state.session.purpose, 本堂備註: state.session.sessionNote,
        動作名稱: payload.exercise, 組數: payload.sets, 次數: payload.reps,
        重量: payload.weight, 秒數: payload.duration, 備注: payload.notes,
        建立時間: new Date().toISOString(),
      });
      state.exerciseForm = { name: '', sets: '', reps: '', weight: '', duration: '', notes: '' };
      showToast('已記錄');
    } else {
      showToast('儲存失敗:' + data.message);
    }
  } catch (e) {
    showToast('連線失敗,請檢查網路或設定');
  } finally {
    state.savingId = null;
    render();
  }
}

function startEdit(r) {
  state.editingId = r.ID;
  state.editDraft = { exercise: r['動作名稱'], sets: r['組數'], reps: r['次數'], weight: r['重量'], duration: r['秒數'], notes: r['備注'] || '' };
  render();
}
function cancelEdit() { state.editingId = null; render(); }
async function saveEdit(id) {
  state.savingId = id;
  render();
  try {
    const res = await fetch(state.sheetUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'update', id, ...state.editDraft }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      state.rows = state.rows.map(r => r.ID === id ? {
        ...r,
        動作名稱: state.editDraft.exercise ?? r['動作名稱'],
        組數: state.editDraft.sets ?? r['組數'],
        次數: state.editDraft.reps ?? r['次數'],
        重量: state.editDraft.weight ?? r['重量'],
        秒數: state.editDraft.duration ?? r['秒數'],
        備注: state.editDraft.notes ?? r['備注'],
      } : r);
      state.editingId = null;
      showToast('已更新');
    } else {
      showToast('更新失敗');
    }
  } catch (e) {
    showToast('連線失敗');
  } finally {
    state.savingId = null;
    render();
  }
}
async function deleteExercise(id) {
  state.savingId = id;
  render();
  try {
    const res = await fetch(state.sheetUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete', id }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      state.rows = state.rows.filter(r => r.ID !== id);
      showToast('已刪除');
    } else {
      showToast('刪除失敗');
    }
  } catch (e) {
    showToast('連線失敗');
  } finally {
    state.savingId = null;
    render();
  }
}

function jumpToSession(key) {
  const s = getSessions().find(x => x.key === key);
  if (!s) return;
  state.session = { student: s.student, date: s.date, purpose: s.purpose || '', sessionNote: s.sessionNote || '' };
  state.tab = 'log';
  state.selectedSessionKey = null;
  render();
}
function selectSession(key) { state.selectedSessionKey = key; render(); }
function backToHistory() { state.selectedSessionKey = null; render(); }

function bindLiveInput(id, path) {
  const el = document.getElementById(id);
  if (!el) return;
  el.oninput = (e) => {
    const keys = path.split('.');
    let obj = state;
    for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
    obj[keys[keys.length - 1]] = e.target.value;
  };
}

function exerciseMetaLine(r) {
  const parts = [];
  if (r['組數']) parts.push(`${esc(r['組數'])} 組`);

  if (r['重量']) parts.push(`${esc(r['重量'])} kg`);
  if (r['秒數']) parts.push(`${esc(r['秒數'])} 秒`);
  if (parts.length === 0) return '';
  return `<div class="exercise-meta">${parts.join(' · ')}</div>`;
}

function tapHistoryStudent(name) {

function selectHistoryMonth(m) {

  if (results) results.innerHTML = renderHistoryResults();
}
function formatMonthLabel(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return `${y}年${parseInt(mo,10)}月`;
}

function renderHistoryResults() {
  const q = state.historySearch.trim();
  let sessions = getSessions();
  if (q) sessions = sessions.filter(s => s.student.includes(q));

  // 如果搜尋文字剛好完全對到一位學生,上面顯示整體訓練量摘要 + 可選月份查看該月平均
  const exactStudent = state.roster.find(s => s.name === q);
  let summaryHtml = '';
  if (exactStudent) {
    const series = getStudentVolumeSeries(q);
    const total = series.reduce((s, x) => s + x.volume, 0);
    const months = Array.from(new Set(series.map(x => x.date.slice(0, 7)))).sort().reverse();
    if (!state.historyMonth || !months.includes(state.historyMonth)) {
      state.historyMonth = months[0] || '';
    }
    const monthSeries = series.filter(x => x.date.slice(0, 7) === state.historyMonth);
    const monthTotal = monthSeries.reduce((s, x) => s + x.volume, 0);
    const monthAvg = monthSeries.length ? Math.round(monthTotal / monthSeries.length) : 0;
    const max = Math.max(1, ...monthSeries.map(x => x.volume));
    summaryHtml = `
    <div class="card" style="margin-bottom:12px;">
      <h3 class="card-title">${esc(q)} 的整體訓練量</h3>
      <p style="font-size:13px;color:#6E8C89;margin:-4px 0 14px;">訓練容量 = 組數 × 次數 × 重量,只計算有填重量的動作</p>
      <div>
        <div class="font-display mono" style="font-size:24px;font-weight:700;color:#233330;">${total.toLocaleString()}</div>
        <div style="font-size:13px;color:#6E8C89;margin-top:2px;">總訓練容量(kg)</div>
      </div>
      ${months.length === 0 ? `<p class="empty-state">還沒有可計算的訓練容量,記錄動作時記得填重量喔</p>` : `
      <div class="field" style="margin-top:16px;">
        <div class="field-label">選擇月份</div>
        <div class="chip-row">${months.map(m => `
          <button onclick="selectHistoryMonth('${m}')" class="chip-sm" style="${state.historyMonth===m ? 'background:#159C93;color:#fff;' : ''}">${formatMonthLabel(m)}</button>
        `).join('')}</div>
      </div>
      <div style="margin-top:14px;margin-bottom:${monthSeries.length ? '14px' : '0'};">
        <div class="font-display mono" style="font-size:22px;font-weight:700;color:#233330;">${monthAvg.toLocaleString()}</div>
        <div style="font-size:13px;color:#6E8C89;margin-top:2px;">${formatMonthLabel(state.historyMonth)} 平均每堂(kg)</div>
      </div>
      ${monthSeries.map(x => `
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;color:#6E8C89;margin-bottom:3px;">
            <span>${fmtDate(x.date)}</span><span class="mono">${x.volume.toLocaleString()} kg</span>
          </div>
          <div style="background:#DCEEEC;border-radius:6px;height:9px;overflow:hidden;">
            <div style="background:#159C93;height:100%;width:${Math.max(4, x.volume / max * 100)}%;border-radius:6px;"></div>
          </div>
        </div>
      `).join('')}
      `}
    </div>`;
  }

  const listHtml = sessions.length === 0
    ? `<p class="empty-state">${q ? '找不到符合的紀錄' : '還沒有任何紀錄'}</p>`
    : sessions.map(s => {
        const vol = getSessionVolume(s.exercises);
        return `
      <button onclick="selectSession('${s.key.replace(/'/g,"&#39;")}')" class="history-item">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span class="history-name">${esc(s.student)}</span>
            ${s.purpose ? `<span class="tag-purpose">${esc(s.purpose)}</span>` : ''}
          </div>
          <div class="history-sub">${fmtDate(s.date)} · ${s.exercises.length} 個動作</div>
        </div>
        <div style="text-align:right;flex-shrink:0;padding-left:10px;">
          ${vol > 0 ? `<div class="mono" style="font-weight:700;color:#159C93;font-size:15px;">${vol.toLocaleString()}kg</div>` : ''}
          <div class="history-time mono" style="margin-top:2px;">${fmtTime(s.latest)}</div>
        </div>
      </button>
    `;
      }).join('');

  return summaryHtml + listHtml;
}

function render() {
  const app = document.getElementById('app');
  let html = '';

  if (!state.sheetUrl) {
    html = renderSetup();
  } else {
    if (state.fetchError) {
      html += `<div class="alert-error">${ic('alert',18)}<span>${esc(state.fetchError)}</span></div>`;
    }
    if (state.tab === 'log') html += renderLog();
    else if (state.tab === 'history') html += renderHistory();
    else if (state.tab === 'settings') html += renderSettings();
  }

  app.innerHTML = html;

  document.getElementById('header-icon').innerHTML = ic('dumbbell', 26);
  document.getElementById('nav-log').innerHTML = ic('plus',22) + '<span>新增紀錄</span>';
  document.getElementById('nav-history').innerHTML = ic('clipboard',22) + '<span>歷史紀錄</span>';
  document.getElementById('nav-settings').innerHTML = ic('settings',22) + '<span>設定</span>';
  ['log','history','settings'].forEach(t => {
    document.getElementById('nav-' + t).classList.toggle('active', state.tab === t);
  });

  bindLiveInput('setup-url', 'urlDraft');
  bindLiveInput('settings-url', 'urlDraft');
  bindLiveInput('purpose-input', 'session.purpose');
  bindLiveInput('session-note-input', 'session.sessionNote');
  bindLiveInput('ex-name', 'exerciseForm.name');
  bindLiveInput('ex-sets', 'exerciseForm.sets');
  bindLiveInput('ex-reps', 'exerciseForm.reps');
  bindLiveInput('ex-weight', 'exerciseForm.weight');
  bindLiveInput('ex-duration', 'exerciseForm.duration');
  bindLiveInput('ex-notes', 'exerciseForm.notes');
  bindLiveInput('new-student-name', 'newStudent.name');
  bindLiveInput('new-student-gender', 'newStudent.gender');
  bindLiveInput('new-student-birthday', 'newStudent.birthday');
  bindLiveInput('student-edit-name', 'studentEditDraft.name');
  bindLiveInput('student-edit-gender', 'studentEditDraft.gender');
  bindLiveInput('student-edit-birthday', 'studentEditDraft.birthday');
  bindLiveInput('edit-exercise', 'editDraft.exercise');
  bindLiveInput('edit-sets', 'editDraft.sets');
  bindLiveInput('edit-reps', 'editDraft.reps');
  bindLiveInput('edit-weight', 'editDraft.weight');
  bindLiveInput('edit-duration', 'editDraft.duration');
  bindLiveInput('edit-notes', 'editDraft.notes');
  bindHistorySearch();
}

// 歷史紀錄搜尋框:即時篩選但只更新結果區塊,不整頁重繪,避免打字打到一半失焦
function bindHistorySearch() {
  const el = document.getElementById('history-search');
  if (!el) return;
  el.oninput = (e) => {
    state.historySearch = e.target.value;
    const results = document.getElementById('history-results');
    if (results) results.innerHTML = renderHistoryResults();
  };
}

render();
if (state.sheetUrl) fetchRows();
</script>
</body>
</html>
